<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระไตรปิฎก 200 ภาษา - ศิษย์พี่</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/4.1.5/css/flag-icons.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Tahoma', sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 2px solid #7c4dff; border-radius: 20px; padding: 30px; max-width: 900px; margin: auto; background-color: #ffffff; box-shadow: 0 10px 25px rgba(124, 77, 255, 0.15); }
        .header { font-weight: bold; margin-bottom: 20px; color: #512da8; text-align: center; font-size: 1.5rem; }
        
        .control-group { text-align: center; margin-bottom: 25px; }
        .thai-btn { background: #fff1f1; border: 2px solid #e53935; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; color: #d32f2f; transition: 0.3s; }
        .thai-btn:hover { background: #e53935; color: white; }
        select { padding: 12px; border-radius: 10px; border: 2px solid #7c4dff; width: 100%; max-width: 500px; margin-bottom: 15px; font-size: 1rem; cursor: pointer; }
        
        .flag-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; padding: 15px; border: 1px solid #e1d4ff; border-radius: 15px; background: #fcfaff; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: white; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .lang-btn:hover { background: #ede7f6; border-color: #7c4dff; }
        
        #fileContent { white-space: pre-wrap; word-wrap: break-word; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">📚 เลือกเล่มพระไตรปิฎก</div>
        <div class="control-group">
            <select id="book-selector" onchange="loadSelectedBook()">
                <option value="" disabled selected>-- เลือกเล่มที่ต้องการอ่าน --</option>
            </select>
            <br>
            <button class="thai-btn" onclick="translatePage('th')">
                <span class="flag-icon flag-icon-th"></span> ภาษาไทย (Thai)
            </button>
        </div>

        <div id="google_translate_element" style="display:none;"></div>
        <div class="flag-container" id="flagContainer"></div>

        <div style="margin-top:20px; padding:25px; border:1px solid #e1d4ff; border-radius:15px;">
            <div id="fileContent">โปรดเลือกเล่มจากรายการด้านบนเพื่ออ่านเนื้อหา...</div>
        </div>
    </div>

    <script type="text/javascript">
        const bookNames = [
            "01 วินย.มหาวิภงฺโค ๑", "02 วินย.มหาวิภงฺโค ๒", "03 วินย.ภิกฺขุนีวิภงฺโค", "04 วินย.มหาวคฺโค ๑", "05 วินย.มหาวคฺโค ๒",
            "06 วินย.จุลฺลวคฺโค ๑", "07 วินย.จุลฺลวคฺโค ๒", "08 วินย.ปริวาโร", "09 สุตฺต ที.สีลกฺขนฺธ", "10 สุตฺต ที.มหาวคฺโค",
            "11 สุตฺต ที.ปาฏิกฺวคฺโค", "12 สุตฺต ม.มูลปณฺณาสกํ", "13 สุตฺต ม.มชฺฌิมปณฺณาสกํ", "14 สุตฺต ม.อุปริปณฺณาสกํ",
            "15 สุตฺต สํ.สคาถวคฺโค", "16 สุตฺต สํ.นิทานวคฺโค", "17 สุตฺต สํ.ขนฺธวารวคฺโค", "18 สุตฺต สํ.สฬายตวคฺโค",
            "19 สุตฺต สํ.มหาวารวคฺโค", "20 สุตฺต องฺ เอก-ทุก-ติก", "21 สุตฺต องฺ จตุกฺก", "22 สุตฺต องฺ ปัญจก-ฉักก",
            "23 สุตฺต องฺ สัตตก-อัฏฐก-นวก", "24 สุตฺต องฺ ทสก-เอกาทสก", "25 สุตฺต ขุ. ขุททกปาฐ-ธรรมบท-อุทาน",
            "26 สุตฺต ขุ. วิมาน-เปต", "27 สุตฺต ขุ. ชาดก ๑", "28 สุตฺต ขุ. ชาดก ๒", "29 สุตฺต ขุ. มหานิทเทส",
            "30 สุตฺต ขุ. จูฬนิทเทส", "31 สุตฺต ขุ. ปฏิสัมภิทามรรค", "32 สุตฺต ขุ. อปทาน ๑", "33 สุตฺต ขุ. อปทาน พุทธวงศ์ ๒",
            "34 อภิ. ธรรมสังคณี", "35 อภิ. วิภังค์", "36 อภิ. ธาตุกถา-ปุคคลปัญญัติ", "37 อภิ. กถาวัตถุ",
            "38 อภิ. ยมก ๑", "39 อภิ. ยมก ๒", "40 อภิ. ปัฏฐาน ๑", "41 อภิ. ปัฏฐาน ๒", "42 อภิ. ปัฏฐาน ๓",
            "43 อภิ. ปัฏฐาน ๔", "44 อภิ. ปัฏฐาน ๕", "45 อภิ. ปัฏฐาน ๖"
        ];

        const selector = document.getElementById('book-selector');
        bookNames.forEach((name, index) => {
            let option = document.createElement('option');
            option.value = `b${index + 1}.txt`;
            option.text = name;
            selector.appendChild(option);
        });

        function loadSelectedBook() {
            const fileName = selector.value;
            const contentDiv = document.getElementById('fileContent');
            contentDiv.innerText = "กำลังโหลดข้อมูล...";
            fetch(fileName)
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(data => { contentDiv.innerText = data; })
                .catch(() => { contentDiv.innerText = "ไม่พบไฟล์ " + fileName + " ในระบบ โปรดตรวจสอบว่าชื่อไฟล์ถูกต้องครับ"; });
        }

        function translatePage(lang) {
            var selectField = document.querySelector("select.goog-te-combo");
            if (selectField) { selectField.value = lang; selectField.dispatchEvent(new Event('change')); }
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'th', autoDisplay: false}, 'google_translate_element');
            setTimeout(() => {
                const select = document.querySelector("select.goog-te-combo");
                const container = document.getElementById('flagContainer');
                if(!select) return;
                const options = Array.from(select.options).slice(1);
                options.forEach(option => {
                    if (option.value === 'th') return;
                    let flagCode = option.value.split('-').pop().toLowerCase();
                    if (flagCode === 'en') flagCode = 'us';
                    if (flagCode === 'zh') flagCode = 'cn';
                    const btn = document.createElement('button');
                    btn.className = 'lang-btn';
                    btn.innerHTML = `<span class="flag-icon flag-icon-${flagCode}"></span> ${option.text}`;
                    btn.onclick = () => translatePage(option.value);
                    container.appendChild(btn);
                });
            }, 1000);
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
