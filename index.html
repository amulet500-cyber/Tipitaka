<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระไตรปิฎก 200 ภาษา - ศิษย์พี่</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/4.1.5/css/flag-icons.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Tahoma', sans-serif; padding: 20px; }
        .card { border: 2px solid #7c4dff; border-radius: 20px; padding: 30px; max-width: 900px; margin: auto; background-color: #ffffff; box-shadow: 0 10px 25px rgba(124, 77, 255, 0.15); }
        .header { font-weight: bold; margin-bottom: 20px; color: #512da8; text-align: center; }
        
        /* ปุ่มไทยพิเศษ */
        .thai-btn-container { text-align: center; margin-bottom: 20px; }
        .thai-btn { background: #fff1f1; border: 2px solid #e53935; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold; color: #d32f2f; display: inline-flex; align-items: center; gap: 10px; }
        
        /* ตารางภาษาที่เหลือ */
        .flag-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 10px; max-height: 300px; overflow-y: auto; padding: 15px; 
            border: 1px solid #e1d4ff; border-radius: 15px; background: #fcfaff;
        }
        .lang-btn { cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: white; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .lang-btn:hover { background: #ede7f6; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">🌐 เลือกภาษาที่ท่านต้องการ:</div>
        <div id="google_translate_element" style="display:none;"></div>
        
        <div class="thai-btn-container">
            <button class="thai-btn" onclick="translatePage('th')">
                <span class="flag-icon flag-icon-th"></span> ภาษาไทย (Thai)
            </button>
        </div>

        <div class="flag-container" id="flagContainer"></div>

        <div style="margin-top:20px; padding:25px; border:1px solid #e1d4ff; border-radius:15px; line-height:1.8;">
            <div id="fileContent">กำลังโหลดเนื้อหา...</div>
        </div>
    </div>

    <script type="text/javascript">
        // ฟังก์ชันโหลดไฟล์ b1.txt
        function loadContent() {
            fetch('b1.txt')
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(data => { document.getElementById('fileContent').innerHTML = data.replace(/\n/g, '<br>'); })
                .catch(() => { document.getElementById('fileContent').innerText = "ไม่พบไฟล์ b1.txt (เปิดผ่าน Live Server นะครับ)"; });
        }

        function translatePage(lang) {
            var selectField = document.querySelector("select.goog-te-combo");
            if (selectField) { selectField.value = lang; selectField.dispatchEvent(new Event('change')); }
        }

        window.onload = loadContent;

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'th', autoDisplay: false}, 'google_translate_element');
            
            setTimeout(() => {
                const select = document.querySelector("select.goog-te-combo");
                const container = document.getElementById('flagContainer');
                const options = Array.from(select.options).slice(1);

                options.forEach(option => {
                    if (option.value === 'th') return; // ข้ามไทยเพราะเราแยกไปปุ่มบนแล้ว

                    let flagCode = option.value.split('-').pop().toLowerCase();
                    if (flagCode === 'en') flagCode = 'us';
                    if (flagCode === 'zh') flagCode = 'cn';
                    
                    const btn = document.createElement('button');
                    btn.className = 'lang-btn';
                    btn.innerHTML = `<span class="flag-icon flag-icon-${flagCode}"></span> ${option.text}`;
                    btn.onclick = () => translatePage(option.value);
                    container.appendChild(btn);
                });
            }, 1000);
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
